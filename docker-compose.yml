version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: agentforge-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: agentforge
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - agentforge-network
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (optional - for caching/sessions)
  redis:
    image: redis:7-alpine
    container_name: agentforge-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - agentforge-network

  # Backend API
  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: agentforge-backend
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=root123
      - DB_NAME=agentforge
      - OPENCLAW_HOME=/data/.openclaw
    volumes:
      - openclaw_data:/data/.openclaw
    ports:
      - '3001:3001'
    depends_on:
      mysql:
        condition: service_healthy
    restart: on-failure
    networks:
      - agentforge-network

  # Frontend Web
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: agentforge-frontend
    ports:
      - '5177:80'
    depends_on:
      - backend
    restart: on-failure
    networks:
      - agentforge-network

volumes:
  mysql_data:
  redis_data:
  openclaw_data:

networks:
  agentforge-network:
    driver: bridge
