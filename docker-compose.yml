version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: clawdash-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: clawdash
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - '3306:3306'
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - clawdash-network

  redis:
    image: redis:7-alpine
    container_name: clawdash-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - clawdash-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clawdash-backend
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES:-prod}
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/clawdash?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_ROOT_PASSWORD:-123456}
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - AUTH_ENABLED=${AUTH_ENABLED:-false}
      - JWT_SECRET=${JWT_SECRET:-clawdash-secret-key}
    ports:
      - '8080:8080'
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure
    networks:
      - clawdash-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: clawdash-frontend
    ports:
      - '80:80'
      - '443:443'
    depends_on:
      - backend
    restart: on-failure
    networks:
      - clawdash-network

volumes:
  mysql_data:
  redis_data:

networks:
  clawdash-network:
    driver: bridge
