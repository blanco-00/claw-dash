# 本地开发模式 - 只启动数据库服务
# 使用方式: cd docker && docker compose -f docker-compose.dev.yml up -d
# 然后本地启动后端和前端进行开发调试

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: clawdash-mysql-dev
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: clawdash
      MYSQL_ROOT_HOST: '%'
    ports:
      - '3306:3306'
    volumes:
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - mysql_data:/var/lib/mysql
    networks:
      - clawdash-dev-network
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (for task queue)
  redis:
    image: redis:7-alpine
    container_name: clawdash-redis-dev
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - clawdash-dev-network

volumes:
  mysql_data:
  redis_data:

networks:
  clawdash-dev-network:
    driver: bridge
