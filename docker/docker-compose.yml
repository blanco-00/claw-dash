services:
  mysql:
    image: mysql:8.0
    container_name: clawdash-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: clawdash
      MYSQL_ROOT_HOST: '%'
    ports:
      - '13306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - clawdash-network
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-uroot', '-proot123']
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: clawdash-redis
    ports:
      - '16379:6379'
    volumes:
      - redis_data:/data
    networks:
      - clawdash-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: clawdash-backend
    volumes:
      - ${HOME}/.openclaw:/root/.openclaw:ro
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=root123
      - DB_NAME=clawdash
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OPENCLAW_API_URL=http://host.docker.internal:18789
      - OPENCLAW_HOST=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - '5178:5178'
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure:10
    networks:
      - clawdash-network

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/frontend/Dockerfile
    container_name: clawdash-frontend
    ports:
      - '5177:80'
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - clawdash-network

volumes:
  mysql_data:
  redis_data:
  openclaw_data:

networks:
  clawdash-network:
    driver: bridge
