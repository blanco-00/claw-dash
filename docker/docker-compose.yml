services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: clawdash-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: clawdash
    ports:
      - '3306:3306'
    volumes:
      - ../docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - clawdash-network
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (for task queue)
  redis:
    image: redis:7-alpine
    container_name: clawdash-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - clawdash-network

  # Backend API (Spring Boot)
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: clawdash-backend
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=root123
      - DB_NAME=clawdash
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=clawdash
      - MYSQL_USERNAME=root
      - MYSQL_PASSWORD=root123
    ports:
      - '5178:5178'
    depends_on:
      mysql:
        condition: service_healthy
    restart: on-failure
    networks:
      - clawdash-network

  # Frontend Web
  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/frontend/Dockerfile
    container_name: clawdash-frontend
    ports:
      - '5177:80'
    depends_on:
      - backend
    restart: on-failure
    networks:
      - clawdash-network

volumes:
  mysql_data:
  redis_data:
  openclaw_data:

networks:
  clawdash-network:
    driver: bridge
